[package]
name = "gn-configs"
version = "0.1.0"
edition = "2024"

[dependencies]
example_lib = { version = "1.0", path = "example_lib" }

[gn.config]
remove_cfgs = [ "//build/config:global-config-to-remove" ]
add_cfgs = [ "//build/config:global-config-to-add" ]

# gn config
[gn.package.example_lib."1.0.0"]
remove_configs = [ "//build/config:config-to-remove" ]
configs = [ "//build/config:config-to-add" ]
