[package]
name = "structured_groups"
version = "0.1.0"
edition = "2024"

[dependencies]
sub_crate = { version = "1.0.0", path = "sub_crate" }

# gn config
[gn.package.sub_crate."1.0.0"]
visibility = [ "//vendor/crate-visibility/*" ]
groups = [
  { name = "sub_crate-v1_0", visibility = [ "//vendor/v1_0-visibility/*" ] },
  { name = "sub_crate-legacy", visibility = [ "//vendor/legacy-visibility/*" ] },
  { name = "sub_crate-another-one" }
]
