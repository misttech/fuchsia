# Attribute for setting up TUN
attribute test_tun_a;
allow test_tun_a self:capability { net_admin };
allow test_tun_a devfs_t:dir {search};
allow test_tun_a devfs_t:chr_file {read write ioctl};
# Permission for reading TUN socket context from /proc link to /dev/net/tun
allow test_tun_a self:lnk_file {getattr};

role test_r types { tun_test_create_t tun_test_no_create_t tun_test_sockcreate_t tun_sockcreate_create_t tun_test_trans_t tun_trans_create_t tun_test_attach_t tun_test_no_attach_t tun_test_relabel_t tun_test_t tun_test_no_relabelto_t tun_test_no_relabelfrom_t};

# Type with TUN create permission
type tun_test_create_t, test_a, test_tun_a;
allow tun_test_create_t self:tun_socket { create };
# Type without TUN create permission
type tun_test_no_create_t, test_a, test_tun_a;

# Type for /proc attr "current" without TUN create permission on self
type tun_test_sockcreate_t, test_a, test_tun_a, socket_test_a;
# Type for /proc attr "sockcreate"
type tun_sockcreate_create_t, test_a;
# "sockcreate" type does not apply on TUN create, leading to a denial.
allow tun_test_sockcreate_t tun_sockcreate_create_t:tun_socket { create };

# Type without TUN create permission, illustrating that type_transition is not followed on TUN
# create, leading to a denial.
type tun_test_trans_t, test_a, test_tun_a;
type tun_trans_create_t, test_a;
type_transition tun_test_trans_t self:tun_socket tun_trans_create_t;
allow tun_test_trans_t tun_trans_create_t:tun_socket { create };


# Type with TUN create and attach_queue permissions
type tun_test_attach_t, test_a, test_tun_a;
allow tun_test_attach_t self:tun_socket { create attach_queue };
# Type without TUN attach_queue permission
type tun_test_no_attach_t, test_a, test_tun_a;
allow tun_test_no_attach_t self:tun_socket { create };

# Types for testing TUN relabelto/relabelfrom.
type tun_test_t, test_a, test_tun_a;
allow tun_test_t self:tun_socket { create };

type tun_test_relabel_t, test_a, test_tun_a;
allow tun_test_relabel_t self:tun_socket { relabelto };
allow tun_test_relabel_t tun_test_t:fd { use };
allow tun_test_relabel_t tun_test_t:tun_socket { relabelfrom };

type tun_test_no_relabelto_t, test_a, test_tun_a;
allow tun_test_no_relabelto_t tun_test_t:fd { use };
allow tun_test_no_relabelto_t tun_test_t:tun_socket { relabelfrom };

type tun_test_no_relabelfrom_t, test_a, test_tun_a;
allow tun_test_no_relabelfrom_t self:tun_socket { relabelto };
allow tun_test_no_relabelfrom_t tun_test_t:fd { use };