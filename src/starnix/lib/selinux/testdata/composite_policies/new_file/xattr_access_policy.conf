type test_xattr_access_file_t;
typeattribute test_xattr_access_file_t file_like_a;
type test_xattr_access_relabeled_file_t;
typeattribute test_xattr_access_relabeled_file_t file_like_a;
type test_xattr_access_noassociate_file_t;
typeattribute test_xattr_access_noassociate_file_t file_like_a;

# Allow the test file to be associated with "tmpfs".
allow test_xattr_access_file_t tmpfs_t:filesystem { associate };
allow test_xattr_access_relabeled_file_t tmpfs_t:filesystem { associate };
neverallow test_xattr_access_noassociate_file_t tmpfs_t:filesystem { associate };

# Allow test domains to read their own process capabilities.
allow test_a self:process { getcap };

# Domain permitted to use CAP_SYS_ADMIN (required for trusted.* access, and writes to security.*)
type test_xattr_capsysadmin_t;
typeattribute test_xattr_capsysadmin_t test_a;
allow test_xattr_capsysadmin_t self:capability { sys_admin };
allow test_xattr_capsysadmin_t test_xattr_access_file_t:file { setattr getattr };
neverallow test_xattr_capsysadmin_t test_xattr_access_file_t:file { read write };

# Domain permitted to use CAP_SYS_ADMIN, but not "setattr".
type test_xattr_capsysadmin_nosetgetattr_t;
typeattribute test_xattr_capsysadmin_nosetgetattr_t test_a;
allow test_xattr_capsysadmin_nosetgetattr_t self:capability { sys_admin };
neverallow test_xattr_capsysadmin_nosetgetattr_t test_xattr_access_file_t:file { setattr getattr };
neverallow test_xattr_capsysadmin_nosetgetattr_t test_xattr_access_file_t:file { read write };

# Domain permitted to use "setattr"/"getattr", but not CAP_SYS_ADMIN.
type test_xattr_nocapsysadmin_setgetattr_t;
typeattribute test_xattr_nocapsysadmin_setgetattr_t test_a;
neverallow test_xattr_nocapsysadmin_setgetattr_t self:capability { sys_admin };
allow test_xattr_nocapsysadmin_setgetattr_t test_xattr_access_file_t:file { setattr getattr };
neverallow test_xattr_nocapsysadmin_setgetattr_t test_xattr_access_file_t:file { read write };

# Domain with "write" and "setattr" permissions to the xattr file, for "user.*" attributes.
type test_xattr_user_t;
typeattribute test_xattr_user_t test_a;
allow test_xattr_user_t test_xattr_access_file_t:file { write setattr read getattr };
neverallow test_xattr_user_t self:capability { sys_admin };

# Domain with only "setattr" permission, not "write", to the xattr file.
type test_xattr_user_nowrite_t;
typeattribute test_xattr_user_nowrite_t test_a;
allow test_xattr_user_nowrite_t test_xattr_access_file_t:file { setattr };
neverallow test_xattr_user_nowrite_t test_xattr_access_file_t:file { write read getattr };

# Domain with only "write" permission, not "setattr", to the xattr file.
type test_xattr_user_nosetattr_t;
typeattribute test_xattr_user_nosetattr_t test_a;
allow test_xattr_user_nosetattr_t test_xattr_access_file_t:file { write };
neverallow test_xattr_user_nosetattr_t test_xattr_access_file_t:file { setattr read getattr };

# Domain with only "getattr" permission, not "read", to the xattr file.
type test_xattr_user_noread_t;
typeattribute test_xattr_user_noread_t test_a;
allow test_xattr_user_noread_t test_xattr_access_file_t:file { getattr };
neverallow test_xattr_user_noread_t test_xattr_access_file_t:file { write read setattr };

# Domain with only "read" permission, not "getattr", to the xattr file.
type test_xattr_user_nogetattr_t;
typeattribute test_xattr_user_nogetattr_t test_a;
allow test_xattr_user_nogetattr_t test_xattr_access_file_t:file { read };
neverallow test_xattr_user_nogetattr_t test_xattr_access_file_t:file { write setattr getattr };

# Domain which is permitted all permissions to relabel the file.
type test_xattr_relabel_t;
typeattribute test_xattr_relabel_t test_a;
allow test_xattr_relabel_t test_xattr_access_file_t:file { relabelfrom };
allow test_xattr_relabel_t test_xattr_access_relabeled_file_t:file { relabelto };
allow test_xattr_relabel_t test_xattr_access_noassociate_file_t:file { relabelto };

# Allow the relabel domain to change its UID.
allow test_xattr_relabel_t self:capability { setuid };

# Domain which lacks "relabelto" permission.
type test_xattr_relabel_norelabelto_t;
typeattribute test_xattr_relabel_norelabelto_t test_a;
allow test_xattr_relabel_norelabelto_t test_xattr_access_file_t:file { relabelfrom };
neverallow test_xattr_relabel_norelabelto_t test_xattr_access_relabeled_file_t:file { relabelto };

# Domain which lacks "relabelfrom" permission.
type test_xattr_relabel_norelabelfrom_t;
typeattribute test_xattr_relabel_norelabelfrom_t test_a;
neverallow test_xattr_relabel_norelabelfrom_t test_xattr_access_file_t:file { relabelfrom };
allow test_xattr_relabel_norelabelfrom_t test_xattr_access_relabeled_file_t:file { relabelto };

# Domain used to test reading the label, which requires only "getattr" (but not "read") access.
type test_xattr_getlabel_t;
typeattribute test_xattr_getlabel_t test_a;
allow test_xattr_getlabel_t test_xattr_access_file_t:file { getattr };
neverallow test_xattr_getlabel_t test_xattr_access_file_t:file { read };
