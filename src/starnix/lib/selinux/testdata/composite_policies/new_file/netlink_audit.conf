#
# Domain from which `NETLINK_AUDIT` sockets may be created but not otherwise used.
#

# Test domain that IS allowed to only create a audit netlink socket.
type audit_netlink_create_test_t;
typeattribute audit_netlink_create_test_t test_a;

# Grant this domain only the permission to create a netlink audit socket
allow audit_netlink_create_test_t self:netlink_audit_socket { create };
neverallow audit_netlink_create_test_t self:netlink_audit_socket { read write recvfrom sendto nlmsg_relay };

#
# Domain from which `NETLINK_AUDIT` sockets may be created and written to.
#

# Test domain that IS allowed to only create and write to audit netlink sockets.
type audit_netlink_write_test_t;
typeattribute audit_netlink_write_test_t test_a;

# Grant this domain permission to create and write to netlink audit sockets.
allow audit_netlink_write_test_t self:netlink_audit_socket { create write };
neverallow audit_netlink_write_test_t self:netlink_audit_socket { read recvfrom sendto nlmsg_relay };

#
# Domain from which `NETLINK_AUDIT` sockets may be created and read from.
#

# Test domain that IS allowed to only create a audit netlink socket.
type audit_netlink_read_test_t;
typeattribute audit_netlink_read_test_t test_a;

# Grant this domain only the permission to create and read a netlink audit socket
allow audit_netlink_read_test_t self:netlink_audit_socket { create read };
neverallow audit_netlink_read_test_t self:netlink_audit_socket { write sendto recvfrom nlmsg_relay };

#
# Domain from which `NETLINK_AUDIT` sockets may be created, written to with relay permission.
#

# Test domain that IS allowed to only create and write to audit netlink sockets.
type audit_netlink_write_relay_test_t;
typeattribute audit_netlink_write_relay_test_t test_a;

# Grant this domain permission to create and write to netlink audit sockets.
allow audit_netlink_write_relay_test_t self:netlink_audit_socket { create write nlmsg_relay };
neverallow audit_netlink_write_relay_test_t self:netlink_audit_socket { read recvfrom };

#
# Domain with full `NETLINK_AUDIT` socket permissions and `audit_write` capability permission.
#

# Test domain that IS allowed to only create and write to audit netlink sockets.
type audit_netlink_allow_with_write_cap_test_t;
typeattribute audit_netlink_allow_with_write_cap_test_t test_a;

# Grant this domain permission to create and write to netlink audit sockets.
allow audit_netlink_allow_with_write_cap_test_t self:netlink_audit_socket { create read write nlmsg_relay };
allow audit_netlink_allow_with_write_cap_test_t self:capability { audit_write };

#
# Domain with full `NETLINK_AUDIT` socket permissions but without `audit_write` capability permission.
#

# Test domain that IS allowed to only create and write to audit netlink sockets.
type audit_netlink_allow_without_write_cap_test_t;
typeattribute audit_netlink_allow_without_write_cap_test_t test_a;

# Grant this domain permission to create and write to netlink audit sockets.
allow audit_netlink_allow_without_write_cap_test_t self:netlink_audit_socket { create read write nlmsg_relay };
neverallow audit_netlink_allow_without_write_cap_test_t self:capability { audit_write };

#
# Domain that is not allowed to use `NETLINK_AUDIT` sockets.
#

# Test domain that IS NOT allowed to use audit netlink sockets.
type audit_netlink_restricted_test_t;
typeattribute audit_netlink_restricted_test_t test_a;

# Explicitly deny all permissions on netlink_audit_socket to this domain to test for policy failure.
neverallow audit_netlink_restricted_test_t self:netlink_audit_socket *;
