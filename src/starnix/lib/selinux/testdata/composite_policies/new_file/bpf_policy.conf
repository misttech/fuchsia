# Needed to create bpf handles.
allow unconfined_t self:capability2 { perfmon bpf };

type bpf_map_none_t, test_a;
type bpf_map_read_t, test_a;
type bpf_map_write_t, test_a;
type bpf_map_read_write_t, test_a;

allow bpf_map_read_t unconfined_t:bpf { map_read };
allow bpf_map_write_t unconfined_t:bpf { map_write };
allow bpf_map_read_write_t unconfined_t:bpf { map_read map_write };

type bpf_pin_no_read_t, test_a;
type bpf_pin_no_write_t, test_a;
type bpf_pin_no_map_read_t, test_a;
type bpf_pin_no_map_write_t, test_a;
type bpf_pin_no_prog_run_t, test_a;
type bpf_pin_all_rights_t, test_a;

allow bpf_pin_no_read_t unconfined_t:bpf { map_read map_write prog_run };
allow bpf_pin_no_write_t unconfined_t:bpf { map_read map_write prog_run };
allow bpf_pin_no_map_read_t unconfined_t:bpf { map_write prog_run };
allow bpf_pin_no_map_write_t unconfined_t:bpf { map_read prog_run };
allow bpf_pin_no_prog_run_t unconfined_t:bpf { map_read map_write };
allow bpf_pin_all_rights_t unconfined_t:bpf { map_read map_write prog_run };

allow bpf_pin_no_read_t unconfined_t:file { write };
allow bpf_pin_no_write_t unconfined_t:file { read };
allow bpf_pin_no_map_read_t unconfined_t:file { read write };
allow bpf_pin_no_map_write_t unconfined_t:file { read write };
allow bpf_pin_no_prog_run_t unconfined_t:file { read write };
allow bpf_pin_all_rights_t unconfined_t:file { read write };

