# Attribute for child domains in fcntl tests.
attribute test_fcntl_child_a;

# Parent domain for fcntl tests.
type test_fcntl_parent_t, test_a;

# Domain used to label test files, pipes, etc.
type test_fcntl_file_t, file_like_a;

# Child domain that does not have the `use` permission for file descriptors
# labeled with the parent's security context.
type test_fcntl_child_no_use_fd_t, test_a, test_fcntl_child_a;
neverallow test_fcntl_child_no_use_fd_t test_fcntl_parent_t:fd { use };
allow test_fcntl_child_no_use_fd_t test_fcntl_file_t:file *;

# Child domain that does not have the `lock` permission to files
# in tmpfs.
type test_fcntl_child_no_lock_t, test_a, test_fcntl_child_a;
allow test_fcntl_child_no_lock_t test_fcntl_parent_t:fd { use };
neverallow test_fcntl_child_no_lock_t test_fcntl_file_t:file { lock };
allow test_fcntl_child_no_lock_t test_fcntl_file_t:file ~lock;

# Child domain that does not have the `lock` permission to files
# in tmpfs.
type test_fcntl_child_no_getattr_t, test_a, test_fcntl_child_a;
allow test_fcntl_child_no_getattr_t test_fcntl_parent_t:fd { use };
neverallow test_fcntl_child_no_getattr_t test_fcntl_file_t:file { getattr };
allow test_fcntl_child_no_getattr_t test_fcntl_file_t:file ~getattr;

# Child domain that does have the `use` permission for file descriptors
# labeled with the parent's security context.
type test_fcntl_child_t, test_a, test_fcntl_child_a;
allow test_fcntl_child_t test_fcntl_parent_t:fd { use };
allow test_fcntl_child_t test_fcntl_file_t:file *;

# Allow the parent to create and open files in tmpfs.
allow test_fcntl_parent_t tmpfs_t:dir { search add_name write };
allow test_fcntl_parent_t test_fcntl_file_t:file { read create setattr write };

# Allow the child to stat files in tmpfs.
#allow test_fcntl_child_a tmpfs_t:dir { search getattr };
#allow test_fcntl_child_a tmpfs_t:file { getattr };

# Allow the child to lock files in tmpfs, for F_SETLEASE.
#allow test_fcntl_child_t tmpfs_t:file { lock };
#allow test_fcntl_child_no_use_fd_t tmpfs_t:file { lock };

# Allow use of shared libraries etc.
allow test_fcntl_child_a file_t:file { read getattr map execute };
allow test_fcntl_child_a file_t:dir { getattr };
allow test_fcntl_child_a unlabeled_t:file { read getattr map execute };

# Allow the parent to setfscreate.
allow test_fcntl_parent_t self:process { setfscreate };

# Allow the parent to read the file containing the child program (needed on Linux usually).
allow test_fcntl_parent_t unlabeled_t:file { read getattr };
