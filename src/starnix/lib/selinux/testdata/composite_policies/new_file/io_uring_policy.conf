class anon_inode
class anon_inode inherits file

type io_uring_test_yes_sqpoll_t;
typeattribute io_uring_test_yes_sqpoll_t test_a;
allow io_uring_test_yes_sqpoll_t io_uring_test_yes_sqpoll_t:io_uring { sqpoll };
allow io_uring_test_yes_sqpoll_t io_uring_test_yes_sqpoll_t:anon_inode { create };

type io_uring_test_no_sqpoll_t;
typeattribute io_uring_test_no_sqpoll_t test_a;
neverallow io_uring_test_no_sqpoll_t io_uring_test_no_sqpoll_t:io_uring { sqpoll };
allow io_uring_test_no_sqpoll_t io_uring_test_no_sqpoll_t:anon_inode { create };

# The test attribute for tests involving the `cmd` permission
attribute io_uring_test_cmd_a;
allow io_uring_test_cmd_a self:anon_inode { create map read write };
allow io_uring_test_cmd_a self:file { read write map };
allow io_uring_test_cmd_a tmpfs_t:dir { search write add_name remove_name };
allow io_uring_test_cmd_a tmpfs_t:file { create read write open unlink getattr };

# The yes version of the `cmd` test
type io_uring_test_yes_cmd_t;
typeattribute io_uring_test_yes_cmd_t test_a, domain_a, file_like_a, io_uring_test_cmd_a;
allow io_uring_test_yes_cmd_t io_uring_test_yes_cmd_t:io_uring { cmd };
allow io_uring_test_yes_cmd_t unconfined_t:io_uring { cmd };

# The no version of the `cmd` test
type io_uring_test_no_cmd_t;
typeattribute io_uring_test_no_cmd_t test_a, domain_a, file_like_a, io_uring_test_cmd_a;
neverallow io_uring_test_no_cmd_t io_uring_test_no_cmd_t:io_uring { cmd };
