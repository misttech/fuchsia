# Process domain for audit-access testing.
type test_audit_access_t;
typeattribute test_audit_access_t test_a;

# Common file-type attribute to allow the test setup to create, associate and open files.
attribute test_audit_access_file_a;
allow test_audit_access_file_a tmpfs_t:filesystem { associate };
allow unconfined_t test_audit_access_file_a:file { create read write execute unlink };

# Test file type which denies RWX access when applied to files or directories.
type test_audit_access_file_t;
typeattribute test_audit_access_file_t test_audit_access_file_a;
neverallow test_audit_access_t test_audit_access_file_t:file { read write execute };
neverallow test_audit_access_t test_audit_access_file_t:dir { read write execute };

# Test file type which denies RWX access when applied to files or directories, and applies the
# audit_access permission to suppress audit-logging of denials.
type test_audit_access_noaudit_file_t;
typeattribute test_audit_access_noaudit_file_t test_audit_access_file_a;
neverallow test_audit_access_t test_audit_access_noaudit_file_t:file { read write execute };
neverallow test_audit_access_t test_audit_access_noaudit_file_t:dir { read write execute };
dontaudit test_audit_access_t test_audit_access_noaudit_file_t:file { audit_access };
