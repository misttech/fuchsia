# Associate the test role with socket types
role test_r types { nlmsg_xperms_test_t nlmsg_xperms_getlink_yes_t nlmsg_xperms_getlink_no_nlmsg_t nlmsg_xperms_no_getlink_t nlmsg_xperms_getlink_no_xperms_t nlmsg_xperms_getroute_yes_t nlmsg_xperms_getroute_no_nlmsg_t nlmsg_xperms_no_getroute_t nlmsg_xperms_getroute_no_xperms_t nlmsg_xperms_newroute_yes_t nlmsg_xperms_newroute_no_t nlmsg_xperms_audit_set_yes_t nlmsg_xperms_audit_set_no_t};

# Type for socket sendmsg
type nlmsg_xperms_test_t, test_a;

allow nlmsg_xperms_test_t self:process { setsockcreate };

# Types for testing netlink xperms
type nlmsg_xperms_getlink_yes_t;
type nlmsg_xperms_getlink_no_xperms_t;
type nlmsg_xperms_getlink_no_nlmsg_t;
type nlmsg_xperms_no_getlink_t;
type nlmsg_xperms_getroute_yes_t;
type nlmsg_xperms_getroute_no_xperms_t;
type nlmsg_xperms_getroute_no_nlmsg_t;
type nlmsg_xperms_no_getroute_t;
type nlmsg_xperms_newroute_yes_t;
type nlmsg_xperms_newroute_no_t;
type nlmsg_xperms_audit_set_yes_t;
type nlmsg_xperms_audit_set_no_t;

# Policy capability for netlink extended permissions
policycap netlink_xperm;

allow nlmsg_xperms_test_t self:capability { net_admin };

# RTM_GETLINK has value 18
# Allow `nlmsg` and xperm RTM_GETLINK, expect access granted.
allow nlmsg_xperms_test_t nlmsg_xperms_getlink_yes_t:netlink_route_socket { create read write nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_getlink_yes_t:netlink_route_socket nlmsg { 18 };
# Allow `nlmsg` without any xperm, expect access granted.
allow nlmsg_xperms_test_t nlmsg_xperms_getlink_no_xperms_t:netlink_route_socket { create read write nlmsg };
# `nlmsg` not granted, expect access denied.
allow nlmsg_xperms_test_t nlmsg_xperms_getlink_no_nlmsg_t:netlink_route_socket { create read write };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_getlink_no_nlmsg_t:netlink_route_socket nlmsg { 18 };
# Allow `nlmsg` but deny RTM_GETLINK, expect access denied.
allow nlmsg_xperms_test_t nlmsg_xperms_no_getlink_t:netlink_route_socket { create read write nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_no_getlink_t:netlink_route_socket nlmsg ~{ 18 };

# RTM_GETROUTE has value 26
# Allow `nlmsg` and xperm RTM_GETROUTE, expect access granted.
allow nlmsg_xperms_test_t nlmsg_xperms_getroute_yes_t:netlink_route_socket { create read write nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_getroute_yes_t:netlink_route_socket nlmsg { 26 };
# Allow `nlmsg` without any xperm, expect access granted.
allow nlmsg_xperms_test_t nlmsg_xperms_getroute_no_xperms_t:netlink_route_socket { create read write nlmsg };
# `nlmsg` not granted, expect access denied.
allow nlmsg_xperms_test_t nlmsg_xperms_getroute_no_nlmsg_t:netlink_route_socket { create write };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_getroute_no_nlmsg_t:netlink_route_socket nlmsg { 26 };
# Allow `nlmsg` but deny RTM_GETROUTE, expect access denied.
allow nlmsg_xperms_test_t nlmsg_xperms_no_getroute_t:netlink_route_socket { create write nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_no_getroute_t:netlink_route_socket nlmsg ~{ 26 };

# RTM_NEWROUTE has value 24
allow nlmsg_xperms_test_t nlmsg_xperms_newroute_yes_t:netlink_route_socket { create write read nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_newroute_yes_t:netlink_route_socket nlmsg { 24 };
allow nlmsg_xperms_test_t nlmsg_xperms_newroute_no_t:netlink_route_socket { create write nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_newroute_no_t:netlink_route_socket nlmsg ~{ 24 };

# AUDIT_SET has value 1001
allow nlmsg_xperms_test_t nlmsg_xperms_audit_set_yes_t:netlink_audit_socket { create read write nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_audit_set_yes_t:netlink_audit_socket nlmsg { 1001 };
allow nlmsg_xperms_test_t nlmsg_xperms_audit_set_no_t:netlink_audit_socket { create write nlmsg };
allowxperm nlmsg_xperms_test_t nlmsg_xperms_audit_set_no_t:netlink_audit_socket nlmsg ~{ 1001 };