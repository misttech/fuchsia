# Subject domains (processes running the tests)
type test_fs_t, test_a;
type test_fs_no_read_t, test_a;
type test_fs_no_write_t, test_a;

# Object domains (target files/directories being accessed)
type test_fs_readdir_dir_t, file_like_a;
type test_fs_fallocate_file_t, file_like_a;

# Allow the directory type to be associated with tmpfs.
allow test_fs_readdir_dir_t tmpfs_t:filesystem { associate };

# Allow the file type to be associated with tmpfs.
allow test_fs_fallocate_file_t tmpfs_t:filesystem { associate };

# Both domains need search and open permission to traverse and open the directory.
allow test_a test_fs_readdir_dir_t:dir { search open };

# Only the "allow" domain has read permission on the directory.
allow test_fs_t test_fs_readdir_dir_t:dir { read };

# The "no_read" domain is explicitly denied read permission.
neverallow test_fs_no_read_t test_fs_readdir_dir_t:dir { read };

# Only the "allow" domain has write permission on the file.
allow test_fs_t test_fs_fallocate_file_t:file { write };

# The "no_write" domain is explicitly denied write permission.
neverallow test_fs_no_write_t test_fs_fallocate_file_t:file { write };

# Types for sendfile/splice tests
type test_fs_sendfile_src_t, file_like_a;
type test_fs_sendfile_dst_t, file_like_a;

# Allow them to be associated with tmpfs
allow test_fs_sendfile_src_t tmpfs_t:filesystem { associate };
allow test_fs_sendfile_dst_t tmpfs_t:filesystem { associate };

# test_fs_t has both read (src) and write (dst) -> Should succeed
allow test_fs_t test_fs_sendfile_src_t:file { read };
allow test_fs_t test_fs_sendfile_dst_t:file { write };

# test_fs_no_read_t lacks read (src) but has write (dst) -> Should fail with EACCES
allow test_fs_no_read_t test_fs_sendfile_dst_t:file { write };
neverallow test_fs_no_read_t test_fs_sendfile_src_t:file { read };

# test_fs_no_write_t has read (src) but lacks write (dst) -> Should fail with EACCES
allow test_fs_no_write_t test_fs_sendfile_src_t:file { read };
neverallow test_fs_no_write_t test_fs_sendfile_dst_t:file { write };
