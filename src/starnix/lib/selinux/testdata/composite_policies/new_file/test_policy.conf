# Defines a test user, role and attribute for userspace tests.

attribute test_a;

user test_u roles { test_r } level s0 range s0 - s1:c0.c1;

role test_r;
role test_r types { test_a };
allow unconfined_r test_r;

# Allow the test process to transition to the test domains.
allow unconfined_t test_a:process { dyntransition };
allow test_a unconfined_t:fd { use };

# Allow test domains to transition into other test domains, by default.
allow test_a test_a:process { dyntransition };
allow test_a self:process { setcurrent fork };

# Access to /proc and /proc/self symlink, and self in /proc/<pid> for transitions.
allow test_a unconfined_a:dir { getattr search };
allow test_a unconfined_a:lnk_file { read };
allow test_a self:dir { getattr search };
allow test_a self:file { open read write getattr };

# Allow writes to the console on Linux.
allow test_a unlabeled_t:chr_file { write };

# Permissions for controlling enforcement
allow test_a selinuxfs_t:dir { search };
allow test_a selinuxfs_t:file { read getattr write};
allow test_a unconfined_t:security { setenforce };

# Allow tests to access all container and test package files.
type test_pkg_file_t;
typeattribute test_pkg_file_t file_like_a;
allow test_a test_pkg_file_t:file { entrypoint execute read getattr map };
allow test_a test_pkg_file_t:dir { read search getattr };

# Under Starnix the test container is set up by the kernel under the `unconfined_t` domain, which
# includes wrapping the root filesystem with an overlay; the `unconfined_t` domain must therefore
# be granted rights to traverse directories, and execute files, with the `file_t` domain that the
# policy applies to unlabeled nodes via the `file` SID.
allow unconfined_t file_t:dir { search };
allow unconfined_t file_t:file { read };

# Tests must also be permitted to traverse the root filesystem, and the "/tmp" directory.
allow test_a file_t:dir { search };
allow test_a tmpfs_t:dir { search };
