# Define the `mprotect_execmem_test_t` type
type mprotect_execmem_test_t;
# Make it inherit from `test_a`
typeattribute mprotect_execmem_test_t test_a;
# Give it `execmem`
allow mprotect_execmem_test_t self:process { execmem };
# Additional permissions to allow using pipes for synchronization
allow mprotect_execmem_test_t self:fifo_file { read write };
# Additional permission to allow signaling
allow mprotect_execmem_test_t self:process { signal };

# Same, but for `execmem` + `execstack`.
type mprotect_execstack_test_t;
typeattribute mprotect_execstack_test_t test_a;
allow mprotect_execstack_test_t self:process { execmem execstack };

# Attribute with the common permissions for the types used in the `execmod` tests.
attribute execmod_test_a;
# To allow creating, writing, and deleting a directory and file in tmpfs.
allow execmod_test_a tmpfs_t:dir { create write search add_name read remove_name getattr rmdir };
allow execmod_test_a tmpfs_t:file { create write read  unlink };
allow execmod_test_a tmpfs_t:filesystem { associate };
allow execmod_test_a unlabeled_t:dir { write };
allow tmpfs_t tmpfs_t:filesystem { associate };
allow execmod_test_a self:process { getcap };
allow execmod_test_a self:capability { sys_admin };
# To allow mapping and making executable a file in tmpfs
allow execmod_test_a tmpfs_t:file { map execute };

# Define the `mprotect_execmod_no_test_t`.
type mprotect_execmod_no_test_t;
# Inherit from `test_a` and `execmod_test_a`
typeattribute mprotect_execmod_no_test_t test_a, execmod_test_a;

# Define the `mprotect_execmod_test_t` type
type mprotect_execmod_yes_test_t;
# Inherit from `test_a` and `execmod_test_a`
typeattribute mprotect_execmod_yes_test_t test_a, execmod_test_a;
typeattribute mprotect_execmod_yes_test_t test_a;
# Give it `execmod`
allow mprotect_execmod_yes_test_t tmpfs_t:file { execmod };
