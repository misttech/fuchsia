type test_append_t, test_a;
type test_append_no_write_t, test_a;
type test_append_no_append_t, test_a;

type test_append_file_t, file_like_a;

# test_append_t has all permissions
allow test_append_t test_append_file_t:file { open read write append getattr };

# test_append_no_write_t has append (but not write or getattr)
allow test_append_no_write_t test_append_file_t:file { open read append };
neverallow test_append_no_write_t test_append_file_t:file { getattr write };

# test_append_no_append_t has write (but not append or getattr)
allow test_append_no_append_t test_append_file_t:file { open read write };
neverallow test_append_no_append_t test_append_file_t:file { getattr append };

# Allow test_append_t to use FDs opened by test_append_no_write_t
allow test_append_t test_append_no_write_t:fd use;

# Allow the file type to be associated with tmpfs (needed for /tmp files)
allow test_append_file_t tmpfs_t:filesystem { associate };


