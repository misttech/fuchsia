class anon_inode
class anon_inode inherits file

type anon_inodefs_t;

# Initial test domain for anon_inode label and access-check testing, including create permission.
type anon_inode_test_t;
typeattribute anon_inode_test_t test_a;

# Initial test domain for validation of create permission checks.
type anon_inode_test_no_create_t;
typeattribute anon_inode_test_no_create_t test_a;

# Grant the test domain permission to create relevant node types.
allow anon_inode_test_t anon_inode_test_userfaultfd_t:anon_inode { create };

# Grant the test domain permission to write to tmpfs, to create the O_TMPFILE node.
allow anon_inode_test_t tmpfs_t:dir { write };
allow anon_inode_test_t tmpfs_t:file { read write getattr };

# Grant the test domain permission to query labels of any anon_inode.
allow anon_inode_test_t file_like_a:anon_inode { getattr };

# Required when creating userfaultfd's.
allow anon_inode_test_t self:capability { sys_ptrace };
allow anon_inode_test_no_create_t self:capability { sys_ptrace };

# Test domain with no `fd { use }` permissions to "anon_inode_test_t" resources.
type anon_inode_no_use_fd;
typeattribute anon_inode_no_use_fd test_a;
neverallow anon_inode_no_use_fd anon_inode_test_t:fd { use };
neverallow anon_inode_no_use_fd file_like_a:anon_inode { read write };

# Test domain with `fd { use }` access to all `"anon_inode_test_t" domains, but no other rights.
type anon_inode_use_fd_no_perms;
typeattribute anon_inode_use_fd_no_perms test_a;
allow anon_inode_use_fd_no_perms anon_inode_test_t:fd { use };
neverallow anon_inode_use_fd_no_perms file_like_a:anon_inode { read write };

# Test domain with `fs { use }` to "anon_inode_test_t" and read/write permissions to "file_like_a".
type anon_inode_use_fd_and_perms;
typeattribute anon_inode_use_fd_and_perms test_a;
allow anon_inode_use_fd_and_perms anon_inode_test_t:fd { use };
allow anon_inode_use_fd_and_perms file_like_a:anon_inode { read write };

# Label user fault FD nodes created by "anon_inode_test_t" with a unique domain.
type anon_inode_test_userfaultfd_t;
typeattribute anon_inode_test_userfaultfd_t file_like_a;
type_transition anon_inode_test_t anon_inode_test_t:anon_inode anon_inode_test_userfaultfd_t "[userfaultfd]";
