attribute test_sched_child_a;

type test_sched_parent_t, test_a;
type test_sched_target_t, test_a;

type test_sched_child_t, test_a, test_sched_child_a;
allow test_sched_child_t test_sched_target_t:process { setsched getsched };
allow test_sched_child_t self:process { setsched };

type test_sched_child_no_setsched_t, test_a, test_sched_child_a;
neverallow test_sched_child_no_setsched_t test_sched_target_t:process { setsched };
neverallow test_sched_child_no_setsched_t self:process { setsched };
allow test_sched_child_no_setsched_t test_sched_target_t:process { getsched };

type test_sched_child_no_getsched_t, test_a, test_sched_child_a;
neverallow test_sched_child_no_getsched_t test_sched_target_t:process { getsched };
allow test_sched_child_no_getsched_t test_sched_target_t:process { setsched };
allow test_sched_child_no_getsched_t self:process { setsched };

allow test_sched_child_a test_sched_target_t:dir { search };

# Allow ScopedTargetProcess (running as test_sched_target_t) to synchronize
# with the test runner (running as unconfined_t) using Rendezvous (pipes).
allow test_sched_target_t unconfined_t:fd use;
allow test_sched_target_t unconfined_t:fifo_file { read write };
