type fuse_t;
type fuse_transitioned_t;
type genfscon_create_t, test_a;
type genfscon_fscreate_file_t, file_like_a;

type_transition genfscon_create_t fuse_t:file fuse_transitioned_t;

allow genfscon_create_t fuse_t:dir { search write add_name };
allow genfscon_create_t fuse_transitioned_t:file { create };
allow genfscon_create_t fuse_t:file { getattr write };
allow fuse_transitioned_t fuse_t:filesystem { associate };

# Allow setting fscreatecon
allow genfscon_create_t self:dir { search };
allow genfscon_create_t self:file { getattr read write };
allow genfscon_create_t self:process { setfscreate };

# We don't need file creation permissions for genfscon_fscreate_file_t since the context is ignored.
neverallow genfscon_create_t genfscon_fscreate_file_t:file { create };
neverallow genfscon_fscreate_file_t fuse_t:filesystem { associate };
