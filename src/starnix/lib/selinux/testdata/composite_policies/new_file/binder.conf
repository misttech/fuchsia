# To allow tests to kill the context manager.
allow unconfined_t binder_context_manager_test_t:process { sigkill };

# Attribute for all binder tests.
attribute binder_test_a;

# Common permissions for all binder tests.
# Allow use of pipes for interprocess coördination of test actions.
allow binder_test_a unconfined_t:fifo_file { write };
# To allow creating a temporary directory to serve as a mount point.
allow tmpfs_t tmpfs_t:filesystem { associate };
allow binder_test_a tmpfs_t:dir { search };
# To allow opening binder and doing `ioctl` calls
allow binder_test_a unlabeled_t:chr_file { read ioctl };
# To allow mmaping a buffer with binder
allow binder_test_a unlabeled_t:chr_file { map };

# Type that allows opening binder
type binder_open_test_t;
typeattribute binder_open_test_t test_a, binder_test_a;

# Type that allows becoming the binder context manager
type binder_context_manager_test_t;
typeattribute binder_context_manager_test_t test_a, binder_test_a;
# To allow becoming context manager
allow binder_context_manager_test_t binder_context_manager_test_t:binder { set_context_mgr };
# The context manager wants to use sys_nice for some reason.
# This permission is not strictly needed as the tests pass without it,
# but it gets rid of an "avc deny" message.
# TODO: https://fxbug.dev/436505176 - understand why this seems necessary
# and possibly eliminate it.
allow binder_context_manager_test_t self:capability { sys_nice };

# Identical to `binder_context_manager_test_t`, but without the `set_context_mgr` permission.
type binder_no_context_manager_test_t;
typeattribute binder_no_context_manager_test_t test_a, binder_test_a;
allow binder_no_context_manager_test_t self:capability { sys_nice };

# Type that allows doing ioctl() syscalls to binder.
type binder_ioctl_no_call_test_t;
typeattribute binder_ioctl_no_call_test_t test_a, binder_test_a;

# Identical to `binder_ioctl_no_call_test_t` with the addition of the `call` permission.
type binder_ioctl_call_test_t;
typeattribute binder_ioctl_call_test_t test_a, binder_test_a;
# To allow doing calls to binder
allow binder_ioctl_call_test_t binder_context_manager_test_t:binder { call };

# Type that allows becoming the context manager in "three-process" tests.
type binder_context_manager_t;
typeattribute binder_context_manager_t test_a, binder_test_a;
allow binder_context_manager_t binder_context_manager_t:binder { set_context_mgr };
allow binder_context_manager_t binder_service_client_t:binder { transfer };
# TODO: https://fxbug.dev/436505176 - this is probably related to the appearance
# of 0x7f in the flags of certain BC_TRANSACTIONs in the test; look more closely
# at that.
allow binder_context_manager_t self:capability { sys_nice };

# Type for the service provider in "three-process" tests.
type binder_service_provider_t;
typeattribute binder_service_provider_t test_a, binder_test_a;
# When the service provider registers itself with the context manager as a
# service provider, that's a call, and it's also a transfer.
allow binder_service_provider_t binder_context_manager_t:binder { call transfer };
# TODO: https://fxbug.dev/436505176 - this is probably related to the appearance
# of 0x7f in the flags of certain BC_TRANSACTIONs in the test; look more closely
# at that.
allow binder_service_provider_t self:capability { sys_nice };

# Type for the client in "three-process" tests.
type binder_service_client_t;
typeattribute binder_service_client_t test_a, binder_test_a;
allow binder_service_client_t unlabeled_t:chr_file { getattr };
allow binder_service_client_t binder_context_manager_t:binder { call transfer };
allow binder_service_client_t binder_service_provider_t:binder { call impersonate };
allow binder_service_client_t binder_service_provider_t:fd { use };
# TODO: https://fxbug.dev/436505176 - this is probably related to the appearance
# of 0x7f in the flags of certain BC_TRANSACTIONs in the test; look more closely
# at that.
allow binder_service_client_t self:capability { sys_nice };

# Allow tests to kill the context manager and service provider.
allow unconfined_t binder_context_manager_t:process { sigkill };
allow unconfined_t binder_service_provider_t:process { sigkill };

# TODO: https://fxbug.dev/422968534 - probably eliminate these.
allow binder_context_manager_t file_t:chr_file { ioctl map read write };
allow binder_service_provider_t file_t:chr_file { ioctl map read write };
allow binder_service_client_t file_t:chr_file { getattr ioctl map read write };
