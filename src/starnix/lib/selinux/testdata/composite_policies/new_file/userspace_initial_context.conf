# Policy capability to enable userspace initial context.
policycap userspace_initial_context;

# Define a specific type for the init SID to verify that the capability
# causes the init SID to use its own context instead of falling back to kernel.
# Because the init SID is applied on `exec()` the test executable itself will
# run under that domain, so apply attributes to grant it necessary permissions.
type test_init_t, unconfined_a, file_like_a, domain_a;

role unconfined_r types { test_init_t };

# Map the init SID to the test_init_t type.
sid init system_u:unconfined_r:test_init_t:s0
