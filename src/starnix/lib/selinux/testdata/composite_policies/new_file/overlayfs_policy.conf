# Attribute for all underlying overlayfs layers (lower, upper, work).
attribute test_overlayfs_file_a;

# Generic label for files and directories that are always accessible.
type test_overlay_file_t;
typeattribute test_overlay_file_t file_like_a, test_overlayfs_file_a;

# Specific upper type for RootLabelMatchesUpper test.
type test_overlayfs_upper_file_t;
typeattribute test_overlayfs_upper_file_t file_like_a, test_overlayfs_file_a;

type test_overlayfs_fs_t;
typeattribute test_overlayfs_fs_t file_like_a, test_overlayfs_file_a;
allow test_overlayfs_file_a test_overlayfs_fs_t:filesystem { associate };
allow test_overlayfs_mounter_t test_overlayfs_fs_t:filesystem { mount };

fs_use_xattr overlay test_u:object_r:test_overlayfs_fs_t:s0;

# Allow underlying layers to be associated with tmpfs.
allow test_overlayfs_file_a tmpfs_t:filesystem { associate };

# Allow tmpfs_t-labeled nodes to be associated with tmpfs_t.
allow tmpfs_t self:filesystem { associate };

# Attribute for all overlayfs test domains (callers and mounters).
attribute test_overlayfs_domain_a;

# All overlayfs test domains must be able to search the underlying directories
# to access the files within them.
allow test_overlayfs_domain_a test_overlayfs_file_a:dir { search };

# Mounter needs to be able to mount on the mount point.
allow test_overlayfs_mounter_t tmpfs_t:dir { mounton };

# Generic caller domain.
type test_overlayfs_caller_t;
typeattribute test_overlayfs_caller_t test_a, test_overlayfs_domain_a;

# Generic mounter domain.
type test_overlayfs_mounter_t;
typeattribute test_overlayfs_mounter_t test_a, test_overlayfs_domain_a;
allow test_overlayfs_mounter_t self:capability { sys_admin dac_read_search dac_override };
allow test_overlayfs_mounter_t test_overlayfs_fs_t:filesystem { mount getattr };
allow test_overlayfs_mounter_t test_overlay_file_t:chr_file *;
allow test_overlayfs_mounter_t test_overlayfs_file_a:dir { getattr setattr };
allow test_overlayfs_mounter_t tmpfs_t:dir { mounton };
allow test_overlayfs_mounter_t tmpfs_t:filesystem { getattr };

# TODO: https://fxbug.dev/403260093 - Fix Starnix not to require "read" permission to the root node
# of upper, lower and workdir, which the Linux implementation does not seem to need.
allow test_overlayfs_mounter_t test_overlayfs_file_a:dir { read };

# Allow all domains to access files with the generic label.
allow test_overlayfs_domain_a test_overlay_file_t:file *;
allow test_overlayfs_domain_a test_overlay_file_t:dir *;

# File label where the caller has read access, but mounter is denied.
type test_overlay_mounter_no_read_file_t;
typeattribute test_overlay_mounter_no_read_file_t file_like_a, test_overlayfs_file_a;
allow test_overlayfs_caller_t test_overlay_mounter_no_read_file_t:file { read getattr open };
allow test_overlayfs_mounter_t test_overlay_mounter_no_read_file_t:file { getattr open };
neverallow test_overlayfs_mounter_t test_overlay_mounter_no_read_file_t:file { read };

# File label where caller has read/write/append, but mounter has only append.
type test_overlay_mounter_append_only_file_t;
typeattribute test_overlay_mounter_append_only_file_t file_like_a, test_overlayfs_file_a;
allow test_overlayfs_caller_t test_overlay_mounter_append_only_file_t:file { read write append getattr open };
allow test_overlayfs_mounter_t test_overlay_mounter_append_only_file_t:file { read append getattr setattr open link };
neverallow test_overlayfs_mounter_t test_overlay_mounter_append_only_file_t:file { write };

# File label where caller only has read access (to test copy-up denial).
type test_overlay_read_only_file_t;
typeattribute test_overlay_read_only_file_t file_like_a, test_overlayfs_file_a;
allow test_overlayfs_domain_a test_overlay_read_only_file_t:file { read getattr open };
neverallow test_overlayfs_domain_a test_overlay_read_only_file_t:file { write append };

# File label that neither caller nor mounter have any access to.
type test_overlay_no_access_file_t;
typeattribute test_overlay_no_access_file_t file_like_a, test_overlayfs_file_a;
neverallow test_overlayfs_domain_a test_overlay_no_access_file_t:file *;