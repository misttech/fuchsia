type test_open_allow_read_open_t, test_a;
type test_open_allow_write_open_t, test_a;
type test_open_allow_read_deny_open_t, test_a;
type test_open_allow_write_deny_open_t, test_a;

type test_open_file_t, file_like_a;

# When the open_perms policy capability is present, the open file permission is
# expected in order to grant file open access.
policycap open_perms;

allow test_open_file_t tmpfs_t:filesystem { associate };

# Allow read and open, expect access granted
allow test_open_allow_read_open_t test_open_file_t:file { read open };

# Allow write and open, expect access granted
allow test_open_allow_write_open_t test_open_file_t:file { write open };

# Allow read but deny open, expect access denied
allow test_open_allow_read_deny_open_t test_open_file_t:file { read };
neverallow test_open_allow_read_deny_open_t test_open_file_t:file { open };

# Allow write but deny open, expect access denied
allow test_open_allow_write_deny_open_t test_open_file_t:file { write };
neverallow test_open_allow_write_deny_open_t test_open_file_t:file { open };
