# The context we want to assign to the filesystem via fscontext=
type test_mount_fscontext_t;

# All test domains in this policy need to be able to mount on an unlabeled_t directory, and use
# the CAP_SYS_ADMIN capability.
attribute test_mount_a;
allow test_mount_a unlabeled_t:dir { mounton };
allow test_mount_a self:capability { sys_admin };
allow test_mount_a test_mount_fscontext_t:filesystem { unmount };

# Domain that is allowed to mount but denied relabelto.
type test_mount_relabelto_denied_t;
typeattribute test_mount_relabelto_denied_t test_a, test_mount_a;
allow test_mount_relabelto_denied_t tmpfs_t:filesystem { mount relabelfrom };
neverallow test_mount_relabelto_denied_t test_mount_fscontext_t:filesystem { relabelto };

# Domain that is allowed to mount but denied relabelfrom.
type test_mount_relabelfrom_denied_t;
typeattribute test_mount_relabelfrom_denied_t test_a, test_mount_a;
allow test_mount_relabelfrom_denied_t tmpfs_t:filesystem { mount };
allow test_mount_relabelfrom_denied_t test_mount_fscontext_t:filesystem { relabelto };
neverallow test_mount_relabelfrom_denied_t tmpfs_t:filesystem { relabelfrom };

# Domain that is allowed to both mount and relabel (from and to).
type test_mount_relabel_allowed_t;
typeattribute test_mount_relabel_allowed_t test_a, test_mount_a;
allow test_mount_relabel_allowed_t tmpfs_t:filesystem { relabelfrom };
allow test_mount_relabel_allowed_t test_mount_fscontext_t:filesystem { mount relabelto };
