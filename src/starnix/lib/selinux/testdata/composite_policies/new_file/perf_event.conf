# Defines labels for SEStarnix userspace perf_event tests.

attribute test_perfmon_a;
allow test_perfmon_a self:capability2 { perfmon };

attribute test_sys_admin_a;
allow test_sys_admin_a self:capability { sys_admin };

# test_perf with all relevant permissions provided.
type test_perf_event_all_permissions_t, test_a, test_perfmon_a;
allow test_perf_event_all_permissions_t self:perf_event { open cpu kernel tracepoint read write };
allow test_perf_event_all_permissions_t self:process { setcap };

type test_perf_event_no_perfmon_t, test_a;
allow test_perf_event_no_perfmon_t self:perf_event { open cpu kernel tracepoint read write };

# test_perf missing the CAP_PERFMON capability, but having CAP_SYS_ADMIN.
type test_perf_event_no_perfmon_with_sys_admin_t, test_a, test_sys_admin_a;
allow test_perf_event_no_perfmon_with_sys_admin_t self:perf_event { open cpu tracepoint kernel read write };

# test_perf missing only the `open` permission.
type test_perf_event_no_open_t, test_a, test_perfmon_a;
allow test_perf_event_no_open_t self:perf_event { cpu kernel tracepoint read write };

# test_perf missing only the `cpu` permission.
type test_perf_event_no_cpu_t, test_a, test_perfmon_a;
allow test_perf_event_no_cpu_t self:perf_event { open kernel tracepoint read write };

# test_perf missing only the `kernel` permission.
type test_perf_event_no_kernel_t, test_a, test_perfmon_a;
allow test_perf_event_no_kernel_t self:perf_event { open cpu tracepoint read write };

# test_perf missing only the `tracepoint` permission.
type test_perf_event_no_tracepoint_t, test_a, test_perfmon_a;
allow test_perf_event_no_tracepoint_t self:perf_event { open cpu kernel read write };

# test_perf missing the `tracepoint` permission and the CAP_PERFMON capability.
type test_perf_event_no_tracepoint_no_perfmon_t, test_a;
allow test_perf_event_no_tracepoint_no_perfmon_t self:perf_event { open cpu kernel read write };

# test_perf missing only the `read` permission.
type test_perf_event_no_read_t, test_a, test_perfmon_a;
allow test_perf_event_no_read_t self:perf_event { open cpu tracepoint kernel write };

# test_perf missing only the `write` permission.
type test_perf_event_no_write_t, test_a, test_perfmon_a;
allow test_perf_event_no_write_t self:perf_event { open cpu tracepoint kernel read };

# test_perf with no permissions.
type test_perf_event_no_permissions_t, test_a;
