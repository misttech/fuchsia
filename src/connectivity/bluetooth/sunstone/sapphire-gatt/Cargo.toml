[package]
name = "sapphire-gatt"
version = "0.1.0"
edition = "2024"

[dependencies]
zerocopy = { version = "0.8.48", features = ["derive"] }
strum = { version = "0.28.0", default-features = false }
strum_macros = "0.28.0"
thiserror = {version = "2.0.18", default-features = false}
futures = {version = "=0.3.31", default-features = false, features = ["async-await"]}
sapphire-async = { path = "../sapphire-async" }
sapphire-sync = { path = "../sapphire-sync" }
sapphire-collections = { path = "../sapphire-collections" }
sapphire-uuid = { path = "../sapphire-uuid" }
sapphire-peer-cache = { path = "../sapphire-peer-cache" }

[dev-dependencies]
sapphire-async = { path = "../sapphire-async", features = ["testing"] }
