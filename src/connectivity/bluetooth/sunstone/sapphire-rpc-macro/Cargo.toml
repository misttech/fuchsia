[package]
name = "sapphire-rpc-macro"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
proc-macro = true

[dependencies]
syn = { version = "2.0", features = ["full"] }
quote = "1.0"
proc-macro2 = "1.0"

[dev-dependencies]
sapphire-async = { path = "../sapphire-async", features = ["testing"] }
sapphire-collections = { path = "../sapphire-collections" }
sapphire-sync = { path = "../sapphire-sync" }

