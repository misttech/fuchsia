[package]
name = "sapphire-async"
version = "0.1.0"
edition = "2024"

[dependencies]
sapphire-collections = { path = "../sapphire-collections" }
sapphire-sync = { path = "../sapphire-sync" }
thiserror = { version = "2.0.18", default-features = false }

[features]
default = []
std = [
  "sapphire-collections/std",
  "sapphire-sync/std",
]
testing = ["std"]

[dev-dependencies]
sapphire-async = { path = ".", features = ["testing"] }
proptest = { version = "1.11.0", default-features = false, features = ["std"] }
futures = "0.3"
