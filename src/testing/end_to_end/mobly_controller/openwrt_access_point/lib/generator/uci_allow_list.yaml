# OpenWrt schema generator configuration
git_tag: "v25.12.4"

targets:
  - name: "radio"
    schema: "wireless.wifi-device.json"
    class_name: "UciRadioOptions"
    output: "../uci_radio_options.py"
    attributes:
      - frag
      - beacon_int
      - rts
      - require_mode
      - supported_rates
      - basic_rates
      - ieee80211h
      - ieee80211d
      - spectrum_mgmt_required
      - local_pwr_constraint

  - name: "bss"
    schema: "wireless.wifi-iface.json"
    class_name: "UciBssOptions"
    output: "../uci_bss_options.py"
    attributes:
      - preamble
      - dtim_period
      - vendor_elements
      - uapsd_advertisement_enabled
      - bss_load_update_period
      - chan_util_avg_period
      - rrm_beacon_report
      - rrm_neighbor_report
      - bss_transition
      - wnm_sleep_mode
      - ieee80211w


