TestBeds:
  - Name: Testbed-One-Fuchsia-Device-One-Virtual-Usb-Hub
    Controllers:
      FuchsiaDevice:
        - name: "fuchsia-e646-f302-a9a2"
          # Specify the USB bus ID of the Fuchsia device on the Linux host.
          # E.g. "1-6" if /sys/bus/usb/devices/1-6 corresponds to this device.
          usb_power_hub_hw:
            # Set to false to avoid requiring sudo during test execution.
            # Requires a udev rule on the host. Setup with:
            #   echo 'SUBSYSTEM=="usb", ENV{DEVTYPE}=="usb_device", ATTR{idVendor}=="18d1", ATTR{idProduct}=="a02b", RUN+="/bin/chmod a+w /sys/bus/usb/devices/$kernel/authorized"' | sudo tee /etc/udev/rules.d/99-fuchsia-usb-authorize.rules
            #   sudo udevadm control --reload-rules && sudo udevadm trigger
            use_sudo: false

          usb_power_hub_impl:
            module: "honeydew.auxiliary_devices.usb_power_hub.linux_virtual_usb_hub"
            class: "LinuxVirtualUsbPowerHub"
