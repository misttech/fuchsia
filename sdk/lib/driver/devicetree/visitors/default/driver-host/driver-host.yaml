%YAML 1.2
---
$id: http://devicetree.org/schemas/driver-host.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Fuchsia Driver Host

maintainers:
  - Suraj Malhotra (surajmalhotra@google.com)

description: |
  This file describes the "fuchsia,driver-host" property, which specifies the
  driver host that a driver that binds to a device should be loaded into.

properties:
  fuchsia,driver-host:
    description: The name of the driver host to which this device should be loaded into.
    $ref: /schemas/types.yaml#/definitions/string

additionalProperties: true

examples:
  - |
    example-device {
      compatible = "example,device";
      fuchsia,driver-host = "#example_driver_host";
    };
