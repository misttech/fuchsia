%YAML 1.2
---
$id: http://devicetree.org/schemas/reset-consumer.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Fuchsia Reset

maintainers:
  - gkalsi@google.com

description: |
  Bindings related to using a reset offered by a reset-controller device.

select: true

properties:
  resets:
    minItems: 1
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      minItems: 1
      maxItems: 2
      description: 1 cell for phandle and 1 for reset specification.
        Refer to reset-controller.yaml reset-cells field.

  reset-names:
    description: Names corresponding to the reset references. Repeated names are allowed.
      Resources will be combined for repeated names. This field must be present. The number of names
      must match the number of entries in resets.

additionalProperties: true

dependentRequired:
  reset-names: [resets]

examples:
  - |
    reset: reset-controller@2000000 {
        compatible = "fuchsia,generic-reset";
        #reset-cells = <1>;
    };

    sdhc_1: sdhci@2100000 {
        compatible = "fuchsia,generic-sdhci";
        resets = <&reset 0x42>;
        reset-names = "core_reset";
    };
