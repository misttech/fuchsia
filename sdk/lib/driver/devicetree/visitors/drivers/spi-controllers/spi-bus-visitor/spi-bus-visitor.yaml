%YAML 1.2
---
$id: http://devicetree.org/schemas/spi-bus-visitor.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: SPI bus visitor

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)
  - Sarah Chan (spqchan@google.com)
  - Braden Kell (bradenkell@google.com)

properties:
  "#address-cells":
    const: 1

  "#size-cells":
    const: 0

patternProperties:
  "^.*@[0-9a-f]+$":
    type: object
    properties:
      reg:
        $ref: /schemas/types.yaml#/definitions/uint32-array
        description: Chip select of child devices.
      spi-max-frequency:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Maximum SPI bus frequency for this child device.
    required:
      - reg

additionalProperties: true
