%YAML 1.2
---
$id: http://devicetree.org/schemas/gpio-consumer.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: GPIO Consumer

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)
  - Sarah Chan (spqchan@google.com)
  - Braden Kell (bradenkell@google.com)

properties:
  gpios:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: GPIOs consumed by the device.

  gpio-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: Names of the GPIOs.

  pinctrl-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: Names of the pin control states.

patternProperties:
  "^pinctrl-[0-9]+$":
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: Pin control state.

additionalProperties: true
