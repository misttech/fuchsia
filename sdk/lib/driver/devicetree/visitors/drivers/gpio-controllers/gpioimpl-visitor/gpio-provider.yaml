%YAML 1.2
---
$id: http://devicetree.org/schemas/gpio-provider.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: GPIO Provider

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)
  - Sarah Chan (spqchan@google.com)
  - Braden Kell (bradenkell@google.com)

properties:
  gpio-controller:
    type: boolean
    description: Indicates this node is a GPIO controller.

  "#gpio-cells":
    const: 2
    description: Number of cells in a GPIO specifier. Must be 2.

patternProperties:
  "^.*$":
    type: object
    description: Child nodes for GPIO hogs or pin control configurations.
    properties:
      # Properties for gpio-hog child nodes
      gpio-hog:
        type: boolean
        description: Indicates this node is a GPIO hog for init GPIOs (produces fuchsia_hardware_pinimpl::InitStep).

      gpios:
        $ref: /schemas/types.yaml#/definitions/phandle-array
        description: "GPIOs to hog. Each element consists of a pin number and flags (0: pull-down, 1: pull-up, 2: none)."

      input:
        type: boolean
        description: Set GPIO as input.

      output-low:
        type: boolean
        description: Set GPIO as output low.

      output-high:
        type: boolean
        description: Set GPIO as output high.

      # Properties for pin control configuration nodes
      pins:
        $ref: /schemas/types.yaml#/definitions/uint32-array
        description: List of pins to configure.

      function:
        $ref: /schemas/types.yaml#/definitions/string
        description: Pin function (string). Must not be specified if function-id exists.

      function-id:
        $ref: /schemas/types.yaml#/definitions/uint64
        description: Pin function (uint64). Must not be specified if function exists.

      drive-strength-microamp:
        description: Drive strength in microamps.

      output-disable:
        type: boolean
        description: Disable output.

      bias-pull-down:
        type: boolean
        description: Enable pull-down bias.

      bias-pull-up:
        type: boolean
        description: Enable pull-up bias.

      bias-disable:
        type: boolean
        description: Disable bias.

      drive-push-pull:
        type: boolean
        description: Set drive type to push-pull.

      drive-open-drain:
        type: boolean
        description: Set drive type to open-drain.

      drive-open-source:
        type: boolean
        description: Set drive type to open-source.

      power-source:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Power source selection.

      # Note: This is singular 'vector' and is a boolean flag for pin configuration.
      # Do not confuse with 'fuchsia,interrupt-wake-vectors' (plural) which is a string array
      # defined in interrupt-wake-vectors.yaml.
      fuchsia,interrupt-wake-vector:
        type: boolean
        description: Mark as wake vector.

additionalProperties: true
