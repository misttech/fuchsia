%YAML 1.2
---
$id: http://devicetree.org/schemas/arm-gic.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ARM GIC visitor

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)
  - Sarah Chan (spqchan@google.com)

properties:
  compatible:
    enum:
      - arm,arm11mp-gic
      - arm,cortex-a15-gic
      - arm,cortex-a7-gic
      - arm,cortex-a5-gic
      - arm,cortex-a9-gic
      - arm,eb11mp-gic
      - arm,gic-400
      - arm,pl390
      - arm,tc11mp-gic
      - qcom,msm-8660-qgic
      - qcom,msm-qgic2
      - arm,gic-v3

  interrupts:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    description: Interrupts consumed by the device.

  interrupt-controller: true

  "#interrupt-cells":
    const: 3

additionalProperties: true
