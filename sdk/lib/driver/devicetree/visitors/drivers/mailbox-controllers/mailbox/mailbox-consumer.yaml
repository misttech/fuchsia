%YAML 1.2
---
$id: http://devicetree.org/schemas/mailbox/mailbox-consumer.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Mailbox

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)
  - Braden Kell (bradenkell@google.com)
  - Sarah Chan (spqchan@google.com)

select: true

properties:
  mboxes:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: Phandle and specifier list. Specifier contains channel (1 cell) or channel and client ID (2 cells).

  mbox-names:
    $ref: /schemas/types.yaml#/definitions/non-unique-string-array

additionalProperties: true

dependentRequired:
  mbox-names: [mboxes]

examples:
  - |
    mailbox@abcd0000 {
      compatible = "example,mailbox-controller";
      reg = <0xabcd0000 0x1000>;
      #mbox-cells = <1>;
    };

    node@abce0000 {
      reg = <0xabce0000 0x1000>;
      mboxes = <&mailbox 1>, <&mailbox 2>;
      mbox-names = "channel-1", "channel-2";
    };
  - |
    mailbox_2: mailbox@abcd1000 {
      compatible = "example,mailbox-controller-2";
      reg = <0xabcd1000 0x1000>;
      #mbox-cells = <2>;
    };

    node@abd00000 {
      reg = <0xabd00000 0x1000>;
      mboxes = <&mailbox_2 1 0x100>, <&mailbox_2 2 0x200>;
      mbox-names = "channel-1-client-100", "channel-2-client-200";
    };
