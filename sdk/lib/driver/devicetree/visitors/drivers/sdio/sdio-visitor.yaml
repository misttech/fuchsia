%YAML 1.2
---
$id: http://devicetree.org/schemas/sdio-visitor.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: SDIO bus visitor

maintainers:
  - Suraj Malhotra <surajmalhotra@google.com>

properties:
  "#address-cells":
    const: 1

  "#size-cells":
    const: 0

patternProperties:
  "^.*@[0-9a-f]+$":
    type: object
    properties:
      reg:
        $ref: /schemas/types.yaml#/definitions/uint32-array
        description: SDIO functions of child devices.
    required:
      - reg

additionalProperties: true
