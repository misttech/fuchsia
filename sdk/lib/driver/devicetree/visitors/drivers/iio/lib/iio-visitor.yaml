%YAML 1.2
---
$id: http://devicetree.org/schemas/iio-visitor.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IIO visitor

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)

properties:
  io-channels:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: IIO channels consumed by the device.

  io-channel-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: Names of the IIO channels.

  "#io-channel-cells":
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Number of cells in an IIO specifier.

additionalProperties: true
