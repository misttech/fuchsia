%YAML 1.2
---
$id: http://devicetree.org/schemas/adc-visitor.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ADC visitor

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)
  - Sarah Chan (spqchan@google.com)

properties:
  io-channels:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: ADC channels consumed by the device.

  io-channel-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: Names of the ADC channels.

  "#io-channel-cells":
    const: 1
    description: Number of cells in an ADC specifier. Must be 1.

additionalProperties: true
