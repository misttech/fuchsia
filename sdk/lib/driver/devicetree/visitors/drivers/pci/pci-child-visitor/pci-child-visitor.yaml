%YAML 1.2
---
$id: http://devicetree.org/schemas/pci-child-visitor.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: PCI child visitor

description: |
  Visits nodes describing a PCI bus (those with `device_type = "pci"`) and wires
  each child to the PCI device that the PCI bus driver discovers at the child's
  bus/device/function (BDF) address.

maintainers:
  - Gurjant Kalsi (gkalsi@google.com)

properties:
  device_type:
    const: pci

  "#address-cells":
    const: 3

  "#size-cells":
    const: 2

patternProperties:
  "^.*@[0-9a-f]+(,[0-9a-f]+)?$":
    type: object
    properties:
      reg:
        description: |
          PCI address of the child device. The first cell ("phys.hi") encodes
          the bus/device/function, following the standard PCI devicetree
          binding.
      pci-id:
        $ref: /schemas/types.yaml#/definitions/uint32-array
        description: |
          Optional, Fuchsia-specific <vendor-id device-id> pair. When present,
          the child is given PCI vendor/device id bind properties so it can bind
          a driver by id rather than only by compatible string. This is not part
          of the standard PCI devicetree binding.
        minItems: 2
        maxItems: 2
    required:
      - reg

additionalProperties: true
