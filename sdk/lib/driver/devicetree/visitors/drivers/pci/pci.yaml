%YAML 1.2
---
$id: http://devicetree.org/schemas/pci.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: PCI visitor

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)

properties:
  compatible:
    enum:
      - pci-host-cam-generic
      - pci-host-ecam-generic

  reg:
    maxItems: 1

  ranges:
    minItems: 1

  interrupt-map:
    minItems: 1

  "#interrupt-cells":
    const: 1

additionalProperties: true
