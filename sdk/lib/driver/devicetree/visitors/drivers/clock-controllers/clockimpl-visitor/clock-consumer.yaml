%YAML 1.2
---
$id: http://devicetree.org/schemas/clock-consumer.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Clock consumer visitor

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)
  - Sarah Chan (spqchan@google.com)
  - Gurjant Kalsi (gkalsi@google.com)

properties:
  clocks:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: Clocks consumed by the device.

  clock-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: Names of the clocks.

  assigned-clocks:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: Clocks assigned to the device for initialization.

  assigned-clock-parents:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: Parent clocks for the assigned clocks.

  assigned-clock-rates:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    description: Rates for the assigned clocks.

additionalProperties: true
