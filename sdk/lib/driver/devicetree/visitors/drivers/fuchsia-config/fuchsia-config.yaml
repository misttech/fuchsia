%YAML 1.2
---
$id: http://devicetree.org/schemas/fuchsia-config.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Fuchsia Driver Configuration Metadata

maintainers:
  - Suraj Malhotra (surajmalhotra@google.com)

description: |
  This binding describes the `fuchsia,config` node, which is used to pass
  arbitrary configuration metadata to Fuchsia drivers. The properties within
  this node are flattened and passed as a dictionary metadata to the driver.
  All properties are interpreted as 32-bit integers or arrays thereof, and
  stored as int64 or int64_vec in the dictionary.

properties:
  $nodename:
    const: fuchsia,config

additionalProperties: true

examples:
  - |
    / {
      devicetree-config-child {
        compatible = "devicetree-config-child";

        fuchsia,config {
          string_prop = "hello";
          int_prop = <0x12345678>;
          nested {
            prop = "world";
          };
        };
      };
    };
