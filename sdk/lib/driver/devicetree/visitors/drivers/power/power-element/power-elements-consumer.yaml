%YAML 1.2
---
$id: http://devicetree.org/schemas/power-elements-consumer.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Fuchsia power element consumer

maintainers:
  - Puneetha Ramachandra (puneetha@google.com)

description: |
  This schema defines the properties for a device node that provides a Fuchsia
  power element configuration. The device node must contain a 'power-elements'
  property with a single phandle pointing to the node that defines the
  power element configuration.

properties:
  power-elements:
    description: A phandle to the power element configuration. The value must be a single phandle.
    $ref: /schemas/types.yaml#/definitions/phandle-array
    maxItems: 1

additionalProperties: true

examples:
  - |
    bt_pwr_elem: bluetooth-power-elements {
      wake-on-interrupt-element {
        power-levels {
          off-level {
            level = <0>;
            level-transition-table {
              transition-to-on {
                target-level = <1>;
                latency-us = <1000>;
              };
            };
          };
          on-level {
            level = <1>;
            level-transition-table {
              transition-to-off {
                target-level = <0>;
                latency-us = <1000>;
              };
            };
            level-dependencies = <&rail_on_level 1>;
          };
        };
      };
    };

    power_ctrl_pwr_elem: power-controller-power-elements {
      rail-1-element {
        power-levels {
          rail_on_level: rail-on-level {
            ...
          };
        };
      };
    };

    bluetooth {
      compatible = "test,bluetooth";
      power-elements = <&bt_pwr_elem>;
    };

    power-controller {
      compatible = "test,power-controller";
      power-elements = <&power_ctrl_pwr_elem>;
    };
