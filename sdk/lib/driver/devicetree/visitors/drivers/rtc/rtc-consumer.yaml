%YAML 1.2
---
$id: http://devicetree.org/schemas/rtc-consumer.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Fuchsia RTC

maintainers:
  - rdzhuang@google.com

description: |
  Bindings related to using rtc offered by a rtc device.

select: true

properties:
  rtcs:
    minItems: 1
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      minItems: 1
      maxItems: 1
      description: 1 cell for phandle.

additionalProperties: false

examples:
  - |
    some_rtc: rtc-device@2000000 {
        compatible = "fuchsia,generic-rtc";
    };

    i_need_to_read_time: i_need_to_read_time@2100000 {
        compatible = "i-need-to-read-time";
        rtcs = <&some_rtc>;
    };
