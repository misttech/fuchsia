%YAML 1.2
---
$id: http://devicetree.org/schemas/audio-codec.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Audio Codec

maintainers:
  - Fuchsia Devicetree Team

properties:
  codecs:
    description: List of phandles referencing audio codec devices.
    $ref: /schemas/types.yaml#/definitions/phandle-array

additionalProperties: true

examples:
  - |
    codec_1: audio-codec@48 {
        compatible = "test-codec";
        reg = <0x0 0x48 0x0 0x10>;
    };

    audio@ff642000 {
        compatible = "test-audio-controller";
        reg = <0x0 0xff642000 0x0 0x2000>;
        codecs = <&codec_1>;
    };
