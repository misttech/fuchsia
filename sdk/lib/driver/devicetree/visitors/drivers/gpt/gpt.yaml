%YAML 1.2
---
$id: http://devicetree.org/schemas/gpt-partitions.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: GPT Partitions

maintainers:
  - Neethu Joseph (neethujoseph@google.com)

description: |
  Bindings for GPT partition names.

properties:
  partition-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: List of partition names.

additionalProperties: true

examples:
  - |
    test-node {
        partition-names = "partition1", "partition2";
    };
