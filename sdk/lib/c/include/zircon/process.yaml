merge_yaml_files: # Common boilerplate for Fuchsia-specific headers.
  - ../fuchsia.yaml

header: zircon/process.h
standards:
  - fuchsia

functions:
  - name: zx_take_startup_handle
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE
    arguments:
      - type: uint32_t

  - name: zx_thread_self
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []
  - name: _zx_thread_self
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []

  - name: zx_process_self
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []
  - name: _zx_process_self
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []

  - name: zx_vmar_root_self
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []
  - name: _zx_vmar_root_self
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []

  - name: zx_job_default
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []
  - name: _zx_job_default
    return_type: zx_handle_t
    attributes:
      - ZX_HANDLE_ACQUIRE_UNOWNED
    arguments: []
