- description: "This roadmap provides a high-level strategy for migrating drivers from the legacy DFv1 to the modern DFv2 architecture. It outlines the phased approach, including preparing the DFv1 driver, implementing the DFv2 wrapper, and eventually removing legacy dependencies like Banjo and `libDDK` in favor of FIDL and `fdf::DriverBase`."
  path: "docs/development/drivers/migration/migrate-from-dfv1-to-dfv2/overview.md"
  title: "Migrate from DFv1 to DFv2"
- description: "This technical reference details the mapping of legacy DDK interfaces and hooks to their modern DFv2 equivalents. It explains how to replace `zx_protocol_device_t` hooks with `fdf::DriverBase` overrides and how to update build dependencies from `libDDK` to the modern driver runtime and component libraries."
  path: "docs/development/drivers/migration/migrate-from-dfv1-to-dfv2/update-ddk-interfaces-to-dfv2.md"
  title: "Update DDK interfaces to DFv2"
- description: "This guide provides detailed instructions on updating auxiliary driver services, such as diagnostics (Inspect), logging, and firmware loading, during the DFv2 migration. It also covers updating component manifests for child and leaf drivers to ensure correct capability routing and runner configuration in the modern framework."
  path: "docs/development/drivers/migration/migrate-from-dfv1-to-dfv2/update-other-services-to-dfv2.md"
  title: "Update other services to DFv2"
- description: "This technical guide provides instructions on how modern DFv2 drivers can continue to serve legacy Banjo protocols to maintain compatibility with unmigrated DFv1 child drivers. It details the use of `compat::BanjoServer` and how to expose Banjo interfaces through the compatibility shim during the migration phase."
  path: "docs/development/drivers/migration/serve-banjo-protocols.md"
  title: "Connect and serve Banjo protocols in a DFv2 driver"
- description: "This document explains the setup and usage of the `compat::DeviceServer`, a critical utility that allows DFv2 drivers to provide services and metadata to legacy DFv1 descendant drivers. It guides developers through the process of initializing the server, adding it to the outgoing directory, and ensuring seamless communication across framework versions."
  path: "docs/development/drivers/migration/set-up-compat-device-server.md"
  title: "Set up the compat device server in a DFv2 driver"
- description: "This document explains how migrated DFv2 drivers can continue to export device nodes to the legacy `devfs` filesystem to maintain compatibility with existing user-space tools and services. It details the use of the `fuchsia.driver.compat` service and the `compat::DeviceServer` to create and manage these nodes."
  path: "docs/development/drivers/migration/set-up-devfs.md"
  title: "Set up devfs"
- description: "This guide introduces DriverTestRealm, an integration testing framework for Fuchsia drivers that provides a hermetic environment identical to a running system. It covers the architectural overview, configuration options via RealmBuilder for isolated tests, and instructions for interacting with drivers and managing device lifecycles in both C++ and Rust environments."
  path: "docs/development/drivers/testing/driver_test_realm.md"
  title: "DriverTestRealm"
- description: "This overview provides a high-level summary of the testing landscape for Fuchsia drivers, categorizing efforts into integration and unit tests. It directs developers toward DriverTestRealm for full-stack validation and the driver testing library for isolated unit tests, while also listing essential mock libraries for faking hardware resources like MMIO and platform devices."
  path: "docs/development/drivers/testing/overview.md"
  title: "Driver testing"
- description: "This document provides essential threading and synchronization tips for testing asynchronous Fuchsia drivers. It explains the role of the synchronization checker in preventing data corruption, demonstrates how to write single-threaded tests using async loops and driver runtimes, and introduces the `TestDispatcherBound` pattern for safely calling blocking functions and managing multi-threaded test environments."
  path: "docs/development/drivers/testing/threading-tips-in-tests.md"
  title: "Threading tips in tests"
- description: "This tutorial explains how to use code generation for driver binding libraries in Fuchsia. It details how to define node properties in `.fidl` files and use the bind compiler to generate C++ or Rust headers that simplify the creation of type-safe bind rules for drivers."
  path: "docs/development/drivers/tutorials/bind-libraries-codegen.md"
