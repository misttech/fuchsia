  path: "docs/development/drivers/driver_guides/configuration/reading_configuration.md"
  title: "Reading configuration values"
- description: "This guide details the necessary board driver modifications for supporting new SoC display controllers. It covers the enumeration of MMIO, IRQ, and BTI resources and how to use `AddComposite` to expose these resources to the display driver, providing a complete example of the integration process."
  path: "docs/development/drivers/driver_guides/display/board_driver_changes.md"
  title: "Modifying board drivers"
- description: "This document explains core hardware concepts for display controller development, including pipes, planes, color spaces, and gamma correction. It provides foundational knowledge for developers working with the display stack, helping them understand how these components interact to produce the final output signal."
  path: "docs/development/drivers/driver_guides/display/hardware_concepts.md"
  title: "What does a display controller do?"
- description: "This overview explains the role of the Fuchsia registers driver in coordinating access to shared hardware registers. It covers core concepts like synchronization to prevent data races during read-modify-write operations, bitfield isolation for secure multi-driver access, and practical instructions for configuring register metadata in board drivers and binding to them."
  path: "docs/development/drivers/driver_guides/registers/overview.md"
  title: "Registers overview"
- description: "This overview introduces the System Power Management Interface (SPMI) bus in Fuchsia, detailing how controllers communicate with target and sub-target devices for power management. It provides a guide for writing SPMI client drivers, including board driver configuration using devicetree, binding properties for target and sub-target services, and implementation requirements for SPMI controller drivers."
  path: "docs/development/drivers/driver_guides/spmi/overview.md"
  title: "SPMI overview"
- description: "This conceptual overview provides a high-level look at the Fuchsia USB subsystem, supporting both host and peripheral device roles. It details the tiered driver architecture, including class-specific hardware drivers, the hub driver for port management, the bus driver for discovery, and the controller interface drivers (HCI and DCI) for low-level packet handling and hardware interaction."
  path: "docs/development/drivers/driver_guides/usb/concepts/overview.md"
  title: "USB system overview"
- description: "This technical guide details the lifecycle of a USB request in Fuchsia, from allocation and submission to cancellation. It explains how request sizes are calculated across the driver stack, provides C and C++ implementation examples for queuing and completion callbacks, and outlines ownership transitions between device drivers, core drivers, and HCI/DCI controllers."
  path: "docs/development/drivers/driver_guides/usb/concepts/request-lifecycle.md"
  title: "Lifecycle of a USB request"
- description: "This document provides an overview of the Fuchsia USB mass storage driver, explaining its split architecture between the SCSI block device and the core driver. It details how he block device layer implements standard block protocols for storage operations, and how the core driver translates these into USB requests for communication with external hardware like flash drives and hard disks."
  path: "docs/development/drivers/driver_guides/usb/concepts/usb-mass-storage.md"
  title: "USB mass storage driver"
- description: "This technical guide explains how to retrieve USB descriptors and endpoints using the Fuchsia USB library. It provides C++ code examples for iterating through interfaces and descriptors, which is a fundamental task for any driver communicating with hardware over the USB bus."
