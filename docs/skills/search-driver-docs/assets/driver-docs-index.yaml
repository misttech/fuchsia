  path: "docs/development/drivers/tutorials/bind-rules-tutorial.md"
  title: "Bind rules tutorial"
- description: "This tutorial provides a practical introduction to implementing and using FIDL in the context of Fuchsia drivers. It covers defining protocols, implementing server ends in a driver, and using client ends to communicate with other components, emphasizing the shift toward FIDL as the primary inter-driver transport."
  path: "docs/development/drivers/tutorials/fidl-tutorial.md"
  title: "FIDL tutorial"
