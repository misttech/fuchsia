  title: "Fuchsia driver development (DFv1)"
- description: "This document provides a curated list of reference examples for various types of Fuchsia drivers, including simple peripheral drivers and complex subsystem integrations. It points developers to source code in the Fuchsia tree that demonstrates best practices for implementing modern DFv2 patterns."
