  title: "Driver examples"
- description: "This document establishes guidelines for using the modern Fuchsia driver runtime API correctly and efficiently. It covers topics such as dispatcher management, asynchronous communication patterns, and thread safety constraints, ensuring that drivers are performant and stable within the system."
  path: "docs/development/drivers/developer_guide/driver-runtime-api-guidelines.md"
  title: "Driver runtime API guidelines"
- description: "This practical guide focuses on the implementation of interrupt handling in modern Fuchsia drivers. It provides code examples for creating interrupt objects, waiting on events using dispatchers, and managing the lifecycle of interrupt threads to ensure responsive hardware interactions."
  path: "docs/development/drivers/developer_guide/handle-interrupts-in-a-driver.md"
  title: "Handle interrupts in a driver"
- description: "This document outlines the evaluation rubric used to assess the quality, performance, and documentation of Fuchsia drivers. It provides a set of standards that all drivers are expected to meet before being merged into the codebase, covering areas such as API design, testing coverage, and architectural compliance."
