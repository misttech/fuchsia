- description: "The Fuchsia driver framework (DFv2) is a system of libraries and components that enables the creation, testing, and distribution of drivers, comprising the driver manager, driver host, driver index, driver runtime, and FIDL interfaces."
  path: "docs/concepts/drivers/driver_framework.md"
  title: "Driver framework (DFv2)"
- description: "Summary of Drivers and Nodes in DFv2, identifying Nodes as building blocks representing physical/virtual devices that form directed acyclic graphs."
  path: "docs/concepts/drivers/drivers_and_nodes.md"
  title: "Drivers and nodes"
- description: "This document explains the process in Fuchsia drivers for accessing a device's memory by mapping a Virtual Memory Object (VMO), which represents the device's Memory-Mapped I/O (MMIO) region, to a Virtual Memory Address Region (VMAR) within the driver host process."
  path: "docs/concepts/drivers/mapping-a-devices-memory-in-a-driver.md"
  title: "Mapping a device's memory in a driver"
- description: "This landing page serves as the entry point for Fuchsia driver development, providing a roadmap to core concepts, tutorials, and best practices. It orients developers to the Driver Framework v2 (DFv2) and explains how to navigate the documentation hierarchy, covering everything from initial setup to advanced debugging and testing."
  path: "docs/development/drivers/README.md"
  title: "Drivers"
- description: "This guide highlights best practices for building drivers using modern GN templates like `fuchsia_driver_component` and `fuchsia_driver_package`. It explains how these templates automatically generate component manifests and ensure that drivers are correctly included in the system image for both x64 and ARM64 architectures."
  path: "docs/development/drivers/best_practices/build.md"
  title: "Building drivers"
- description: "This document outlines the best practices and required procedures for safely deleting drivers from the Fuchsia source tree. It covers obtaining necessary approvals, updating the driver epitaphs registry, and ensuring that all associated code and documentation are removed to maintain codebase hygiene."
  path: "docs/development/drivers/best_practices/deleting.md"
  title: "Deleting drivers"
- description: "This guide outlines best practices for optimizing the performance of Fuchsia driver stacks, focusing on API design and implementation. It covers topics like avoiding synchronous operations, encouraging batching, minimizing data copies, clarifying flow control, and accounting for ordering constraints to reduce syscall overhead and maximize hardware efficiency."
  path: "docs/development/drivers/best_practices/driver_stack_performance.md"
  title: "Driver stack performance"
- description: "This document describes the VMO registration pattern, a critical technique for zero-copy data transfers between applications and hardware in Fuchsia. It explains how to split communication into control and data planes, using pre-registered VMOs to avoid the high cost of repeated pinning and mapping operations, and discusses implementation considerations like Zircon FIFOs and security."
  path: "docs/development/drivers/best_practices/vmo-registration-pattern.md"
  title: "VMO registration pattern"
- description: "This document introduces the core concepts of the Fuchsia device driver model, explaining the hierarchical relationship between drivers and the hardware they manage. It provides foundational knowledge on how the system organizes devices into a tree-like structure (legacy) or node topology (modern) for discovery and lifecycle management."
  path: "docs/development/drivers/concepts/device_driver_model/README.md"
  title: "Device driver model"
- description: "This conceptual guide explains the architecture of composite devices, which represent hardware that requires resources from multiple parent drivers. It details how to define composite fragments, use binding instructions to match parents, and how the framework aggregates these resources into a single node for the driver."
  path: "docs/development/drivers/concepts/device_driver_model/composite.md"
  title: "Composite devices"
- description: "This document details the lifecycle of a device in Fuchsia, from its initial creation and binding to its final teardown and release. It explains the various hooks and state transitions involved in both DFv1 and DFv2, emphasizing how the framework ensures safe and orderly management of hardware resources."
  path: "docs/development/drivers/concepts/device_driver_model/device-lifecycle.md"
  title: "Device driver lifecycle"
- description: "This conceptual overview describes how Fuchsia represents hardware devices as software objects within the driver framework. It discusses the abstraction of device properties, the role of protocols in defining device behavior, and how the model enables modularity and isolation by separating driver logic from hardware specifics."
  path: "docs/development/drivers/concepts/device_driver_model/device-model.md"
  title: "Device model"
- description: "This technical reference details the standard operations and hooks available for device management in Fuchsia. It provides ordering guarantees for initialization and teardown hooks, explaining how the framework sequences calls to ensure that resources are allocated and released safely across different threads and processes."
  path: "docs/development/drivers/concepts/device_driver_model/device-ops.md"
  title: "The Device ops"
- description: "This overview discusses power management strategies for devices in Fuchsia, explaining how drivers participate in system-wide power state transitions. It covers the implementation of power hooks, the use of Power Broker for capability coordination, and how drivers can optimize energy consumption by managing device-specific sleep and wake states."
  path: "docs/development/drivers/concepts/device_driver_model/device-power.md"
  title: "Device power management"
- description: "This document explains the driver binding process, where the system matches available drivers to discovered hardware based on a set of defined rules. It details how the Driver Index evaluates bind rules against node properties to ensure that the most appropriate driver is loaded for each device in the system."
  path: "docs/development/drivers/concepts/device_driver_model/driver-binding.md"
  title: "Driver binding"
- description: "This document discusses the central role of the Fuchsia Interface Definition Language (FIDL) in modern driver development. It explains how FIDL is used to define stable, language-independent interfaces for driver communication, enabling safe and efficient capability routing across component boundaries in DFv2."
  path: "docs/development/drivers/concepts/device_driver_model/fidl.md"
  title: "FIDL in drivers"
- description: "This guide explains the mechanisms for loading and managing firmware in Fuchsia drivers. It discusses the differences between legacy `load_firmware` calls and modern component-based approaches, detailing how drivers should retrieve firmware images from the system and safely upload them to hardware devices."
  path: "docs/development/drivers/concepts/device_driver_model/firmware.md"
  title: "Device firmware"
- description: "This high-level introduction provides an overview of the Fuchsia device driver model, explaining its goals of security, stability, and performance. It introduces the fundamental concepts of drivers as user-space components and sets the stage for more detailed explorations of the framework's architecture and operation."
  path: "docs/development/drivers/concepts/device_driver_model/introduction.md"
  title: "Introduction"
- description: "This document details the platform bus driver's role in discovering and enumerating hardware resources on Systems-on-Chip (SoC) where standard discovery mechanisms like PCI are absent. It explains how the platform bus uses board-specific information to provide drivers with MMIO, IRQ, and BTI resources via the `fuchsia.hardware.platform.device` protocol."
  path: "docs/development/drivers/concepts/device_driver_model/platform-bus.md"
  title: "Platform Bus"
- description: "This document explains the concept of protocols as the primary interface for driver-to-driver communication in Fuchsia. It contrasts legacy Banjo protocols with modern FIDL-based service discovery, detailing how protocols define the methods and events that allow drivers to interact within the device hierarchy."
  path: "docs/development/drivers/concepts/device_driver_model/protocol.md"
  title: "Protocols in drivers"
- description: "This overview describes the Fuchsia input driver architecture, focusing on the `fuchsia.input.report` FIDL API. It explains how drivers for mice, keyboards, and touchscreens provide stateless reports that reflect raw hardware data, which is then processed by higher-level components in the input pipeline."
  path: "docs/development/drivers/concepts/driver_architectures/input_drivers/input.md"
  title: "Fuchsia input drivers"
- description: "This document details the `input_report_reader` library, which simplifies the implementation of input drivers by managing the distribution of reports to multiple clients. It explains how to use the `InputReportReaderManager` to translate raw hardware readings into standard FIDL reports for upstream consumers."
  path: "docs/development/drivers/concepts/driver_architectures/input_drivers/input_report_reader.md"
  title: "Input report reader library"
- description: "This document outlines the architecture for SD/MMC drivers in Fuchsia, detailing the separation between platform-specific controller drivers and the core SD/eMMC block driver. It explains how these drivers implement standard protocols like `fuchsia.hardware.sdmmc` to provide storage capabilities to the rest of the system."
  path: "docs/development/drivers/concepts/driver_architectures/sdmmc_drivers/sdmmc.md"
  title: "SDMMC drivers architecture"
- description: "This document details the role of PCI Base Address Registers (BARs) in hardware discovery and memory-mapped I/O (MMIO) for Fuchsia drivers. It explains how drivers retrieve BAR information from the PCI bus, map these regions into their address space using VMOs, and use libraries like `lib/mmio` to safely access hardware registers."
  path: "docs/development/drivers/concepts/driver_development/bar.md"
  title: "Configuration"
- description: "This document explains the implementation of Direct Memory Access (DMA) in Fuchsia drivers, detailing how to manage memory buffers for high-performance hardware interactions. It covers the use of Bus Transaction Initiators (BTIs) to pin memory, ensure cache coherency, and provide IOMMU protection, which is essential for drivers that transfer large volumes of data."
  path: "docs/development/drivers/concepts/driver_development/dma.md"
  title: "DMA (Direct Memory Access)"
- description: "This document outlines the procedures for initializing and configuring General Purpose Input/Output (GPIO) pins in the Fuchsia driver ecosystem. It covers how to use the GPIO protocol to set pin directions, pull-up/pull-down resistors, and interrupt triggers, which is critical for supporting basic hardware interactions in peripheral drivers."
  path: "docs/development/drivers/concepts/driver_development/gpio-initialization.md"
  title: "GPIO initialization"
- description: "This technical guide explains the management and handling of hardware interrupts within Fuchsia drivers, focusing on the use of Zircon interrupt objects. It details the difference between physical and virtual interrupts, how to wait on interrupt handles in a dedicated thread, and best practices for integrating interrupt service routines with the modern driver runtime."
  path: "docs/development/drivers/concepts/driver_development/interrupts.md"
  title: "Interrupts"
- description: "This guide focuses on the Driver Development Kit Template Library (DDKTL), a C++ library designed to simplify the creation of legacy DFv1 drivers. It explains how DDKTL uses mixin templates to implement standard driver operations like `Bind`, `Unbind`, and `Release`, and provides a structured approach to managing device lifecycles in the old framework."
  path: "docs/development/drivers/concepts/driver_development/using-ddktl.md"
  title: "Using the C++ DDK Template Library"
- description: "This conceptual overview introduces the Fuchsia Driver Framework (FDF), explaining its role in abstracting hardware and providing a secure, stable environment for driver execution. It discusses the key primitives used by the framework, including nodes, dispatchers, and handles, and how they contribute to the system's overall security and performance."
  path: "docs/development/drivers/concepts/fdf.md"
  title: "Fuchsia Driver Framework (DFv1)"
- description: "This developer guide provides step-by-step instructions for creating and configuring composite device nodes in DFv2. It details the use of `CompositeNodeSpec` and bind rules to aggregate resources from multiple parent drivers, enabling complex hardware configurations like audio or touch controllers."
  path: "docs/development/drivers/developer_guide/create-a-composite-node.md"
  title: "Create a composite node"
- description: "This comprehensive guide covers the core workflow for writing and maintaining Fuchsia drivers, from initial project setup to deployment. It discusses coding standards, API design, and the use of the component framework for managing driver lifecycles, serving as a primary reference for all driver developers."
