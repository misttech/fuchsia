  title: "Driver dispatcher performance"
- description: "The document discusses the concept of driver binding in the Fuchsia driver framework (DFv2), explaining how drivers are matched to device nodes based on bind rules and node properties, and detailing the binding sequence during system boot and dynamic device discovery."
  path: "docs/concepts/drivers/driver_binding.md"
