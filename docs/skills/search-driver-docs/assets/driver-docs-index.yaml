  path: "docs/development/drivers/tutorials/sdk_build_driver/driver-service.md"
  title: "Driver service"
- description: "This tutorial chapter demonstrates how to build a client tool, `eductl`, to interact with a Fuchsia driver's exposed service capabilities. It covers creating a new tool component using Bazel, implementing the client-side FIDL logic to connect to the driver's service, and executing subcommands for hardware liveness checks and factorial computations through the `driver_playground` environment."
  path: "docs/development/drivers/tutorials/sdk_build_driver/driver-tools.md"
  title: "Interact with the driver"
- description: "This tutorial chapter guides developers through exploring the QEMU edu device on a running Fuchsia system. It demonstrates how to use `ffx driver` commands to list device nodes, discover the edu device via its PCI Vendor and Device IDs (VID/DID), and inspect device properties to understand how the driver framework matches drivers to hardware nodes."
  path: "docs/development/drivers/tutorials/sdk_build_driver/explore-device.md"
  title: "Explore the edu device"
- description: "This tutorial segment guides developers through configuring hardware resources for the QEMU edu driver. It covers connecting to the PCI device protocol, mapping MMIO registers and interrupts into the driver's address space using VMOs, and implementing register access methods for liveness checks and factorial computations using the `hwreg` library."
  path: "docs/development/drivers/tutorials/sdk_build_driver/hardware-resources.md"
  title: "Configure hardware resources"
- description: "This introductory chapter of the QEMU edu driver codelab provides a high-level overview of Fuchsia driver development within the component framework. It sets the stage for building a virtual educational device driver that computes factorials, outlining the learning objectives like hardware discovery, binding, and interacting with drivers using the Fuchsia SDK and Bazel build system."
  path: "docs/development/drivers/tutorials/sdk_build_driver/introduction.md"
  title: "Codelab: QEMU edu driver"
- description: "This tutorial chapter covers the essential workflows for testing and debugging Fuchsia drivers using the Fuchsia debugger (`zxdb`) and the Test Runner Framework. It demonstrates how to attach the debugger to a driver host process, set breakpoints in driver logic, step through code, and create a system test component that exercises driver functions like liveness checks and factorial computations."
  path: "docs/development/drivers/tutorials/sdk_build_driver/test-debug.md"
  title: "Test and debug the driver"
