  path: "docs/development/drivers/migration/migrate-from-banjo-to-fidl/faq.md"
  title: "Banjo to FIDL FAQ"
- description: "This document provides a roadmap for migrating driver interfaces from the legacy Banjo transport to modern FIDL. It explains the architectural benefits of FIDL, including better isolation and asynchronous communication, and outlines the steps required to redefine protocols and update client/server implementations."
  path: "docs/development/drivers/migration/migrate-from-banjo-to-fidl/overview.md"
  title: "Migrate from Banjo to FIDL"
- description: "This FAQ addresses common challenges and edge cases encountered during the migration from DFv1 to DFv2. It provides answers regarding the necessity of the compatibility shim, how to handle Banjo in a DFv2 world, changes in node lifecycle management, and how to transition logging and inspection to modern patterns."
  path: "docs/development/drivers/migration/migrate-from-dfv1-to-dfv2/faq.md"
