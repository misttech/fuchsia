  title: "Troubleshoot common issues in DFv2 driver development"
- description: "This step-by-step tutorial walks developers through the process of writing a minimal DFv2 driver from scratch. It covers creating the driver component, implementing the `Start` hook using `DriverBase`, and defining the bind rules required for the driver to load on target hardware."
  path: "docs/development/drivers/developer_guide/write-a-minimal-dfv2-driver.md"
  title: "Write a minimal DFv2 driver"
- description: "This document provides a high-level overview of the Fuchsia Driver Framework (DFv2), detailing the transition from the legacy DFv1 architecture to a modern, component-based model. It explains the core architectural components like the Driver Manager, Driver Host, and Driver Index, and highlights the benefits of using FIDL for communication and the component framework for lifecycle management."
  path: "docs/development/drivers/dfv2-overview.md"
  title: "DFv2 driver development documentation"
- description: "This document describes the various diagnostic utilities and tools available for debugging and monitoring drivers in Fuchsia. It explains how drivers advertise services for diagnostic consumption and how tools like `i2cutil` or `spiutil` use FIDL interfaces to interact with hardware for troubleshooting."
  path: "docs/development/drivers/diagnostics/driver-utils.md"
  title: "Driver utilities"
- description: "This guide explains the use of the Inspect diagnostic system within Fuchsia drivers, detailing how to create and manage an inspection hierarchy. It discusses the differences between driver-level and component-level inspection and provides practical examples of publishing metrics for real-time system monitoring."
  path: "docs/development/drivers/diagnostics/inspect.md"
  title: "Using Inspect for drivers"
- description: "This document provides best practices and API references for logging from Fuchsia drivers using the `zxlogf` macro and modern equivalents. It explains how to control log levels via platform configuration and how driver logs are tagged and filtered for viewing using system tools like `ffx log`."
