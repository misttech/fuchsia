  path: "docs/development/drivers/diagnostics/tracing.md"
  title: "Add tracing to a driver"
- description: "This guide explains how to provide configuration capabilities to Fuchsia drivers using the assembly system. It details the process of adding new configuration keys to platform subsystems, setting their values, and routing these capabilities through the component hierarchy to ensure they are accessible to boot and base drivers."
  path: "docs/development/drivers/driver_guides/configuration/providing_configuration.md"
  title: "Providing configuration"
