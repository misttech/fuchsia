[package]
name = "bt-vcs"
description = "Client and server library for the Volume Control Service"
version = "0.0.1"
edition = "2021"
license = "BSD-2-Clause"

[dependencies]
### In-tree dependencies
bt-gatt = { path = "../bt-gatt" }
bt-common = { path = "../bt-common" }

### Others
futures = "=0.3.31"
parking_lot = "0.12.4"
thiserror = "2.0.12"

[dev-dependencies]
pretty_assertions = "1.2.1"
bt-gatt = { path = "../bt-gatt", features = ["test-utils"] }
